<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Foldwink — Cover Image Generator</title>
    <style>
      body {
        background: #0f1115;
        color: #e8eaf0;
        font-family: -apple-system, sans-serif;
        margin: 2rem;
      }
      canvas {
        border: 1px solid #2e343f;
        border-radius: 12px;
      }
      button {
        background: #7cc4ff;
        color: #0f1115;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        margin-top: 1rem;
        display: block;
      }
      .note {
        font-size: 0.75rem;
        color: #8a8f9a;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <h1>Foldwink — Cover Image Generator</h1>
    <p style="color: #8a8f9a">Generates itch.io cover (630×500) and OG raster (1200×630).</p>

    <h2>Cover (630×500)</h2>
    <canvas id="cover" width="630" height="500"></canvas>
    <button onclick="dl('cover', 'foldwink-cover-630x500.png')">Download Cover PNG</button>

    <h2>OG Image (1200×630)</h2>
    <canvas id="og" width="1200" height="630"></canvas>
    <button onclick="dl('og', 'foldwink-og-1200x630.png')">Download OG PNG</button>

    <div class="note">
      These are interim typographic covers. Replace with designed artwork when available.
    </div>

    <script>
      const F =
        "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif";
      const C = {
        bg: "#0f1115",
        surface: "#181b22",
        text: "#e8eaf0",
        muted: "#8a8f9a",
        accent: "#7cc4ff",
        s1: "#f5c86b",
        s2: "#8cd28e",
        s3: "#ef9e9e",
        s4: "#b49cf0",
      };

      function rr(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      function drawCover(canvas) {
        const ctx = canvas.getContext("2d");
        const W = 630,
          H = 500;
        // BG
        const g = ctx.createRadialGradient(W / 2, H / 2, 50, W / 2, H / 2, W * 0.7);
        g.addColorStop(0, "#161922");
        g.addColorStop(1, C.bg);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
        // 2x2 tiles
        const ts = 60,
          tg = 10,
          tx = (W - 2 * ts - tg) / 2,
          ty = 80;
        [
          [C.s1, 0, 0],
          [C.s2, 1, 0],
          [C.s3, 0, 1],
          [C.s4, 1, 1],
        ].forEach(([c, cx, cy]) => {
          ctx.fillStyle = c;
          rr(ctx, tx + cx * (ts + tg), ty + cy * (ts + tg), ts, ts, 10);
          ctx.fill();
        });
        ctx.fillStyle = C.accent;
        ctx.beginPath();
        ctx.arc(tx + ts + tg / 2, ty + ts + tg / 2, 5, 0, Math.PI * 2);
        ctx.fill();
        // Title
        ctx.textAlign = "center";
        ctx.textBaseline = "alphabetic";
        ctx.fillStyle = C.text;
        ctx.font = `800 72px ${F}`;
        ctx.fillText("Foldwink", W / 2, 300);
        ctx.fillStyle = C.accent;
        ctx.fillRect(W / 2 - 40, 314, 80, 4);
        ctx.fillStyle = C.muted;
        ctx.font = `600 16px ${F}`;
        ctx.fillText("BY  NEURAL  VOID", W / 2, 348);
        // Tagline
        ctx.fillStyle = C.muted;
        ctx.font = `500 20px ${F}`;
        ctx.fillText("A short daily grouping puzzle", W / 2, 395);
        ctx.fillText("500 curated puzzles · 3 difficulties", W / 2, 425);
        ctx.fillText("Foldwink Tabs reveal the categories", W / 2, 455);
      }

      function drawOG(canvas) {
        const ctx = canvas.getContext("2d");
        const W = 1200,
          H = 630;
        const g = ctx.createLinearGradient(0, 0, W, H);
        g.addColorStop(0, "#0f1115");
        g.addColorStop(1, "#181b22");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
        // Tiles left side
        const ts = 100,
          tg = 14;
        [
          [C.s1, 0, 0],
          [C.s2, 1, 0],
          [C.s3, 0, 1],
          [C.s4, 1, 1],
        ].forEach(([c, cx, cy]) => {
          ctx.fillStyle = c;
          rr(ctx, 80 + cx * (ts + tg), 180 + cy * (ts + tg), ts, ts, 14);
          ctx.fill();
        });
        // Empty tiles row below
        for (let i = 0; i < 4; i++) {
          ctx.fillStyle = "#1f232c";
          rr(ctx, 80 + i * (ts + tg), 180 + 2 * (ts + tg), ts, ts, 14);
          ctx.fill();
        }
        ctx.fillStyle = C.accent;
        ctx.beginPath();
        ctx.arc(80 + ts + tg / 2, 180 + ts + tg / 2, 4, 0, Math.PI * 2);
        ctx.fill();
        // Text right side
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
        ctx.fillStyle = C.text;
        ctx.font = `800 82px ${F}`;
        ctx.fillText("Foldwink", 560, 220);
        ctx.fillStyle = C.muted;
        ctx.font = `600 18px ${F}`;
        ctx.fillText("BY  NEURAL  VOID", 560, 255);
        ctx.fillStyle = C.muted;
        ctx.font = `500 28px ${F}`;
        ctx.fillText("Daily grouping puzzle", 560, 310);
        ctx.fillStyle = "#c4c8d2";
        ctx.font = `500 24px ${F}`;
        ctx.fillText("500 curated puzzles · 3 difficulties", 560, 370);
        ctx.fillText("Foldwink Tabs reveal the categories", 560, 406);
      }

      drawCover(document.getElementById("cover"));
      drawOG(document.getElementById("og"));

      window.dl = function (id, name) {
        document.getElementById(id).toBlob((b) => {
          const a = document.createElement("a");
          a.href = URL.createObjectURL(b);
          a.download = name;
          a.click();
          URL.revokeObjectURL(a.href);
        }, "image/png");
      };
    </script>
  </body>
</html>
