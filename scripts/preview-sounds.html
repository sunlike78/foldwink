<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Foldwink — Sound Preview</title>
    <style>
      body {
        background: #0f1115;
        color: #e8eaf0;
        font-family: -apple-system, sans-serif;
        margin: 2rem;
      }
      h1 {
        font-size: 1.5rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.75rem;
        max-width: 600px;
        margin-top: 1rem;
      }
      button {
        background: #181b22;
        border: 1px solid #2e343f;
        color: #e8eaf0;
        padding: 1rem;
        border-radius: 12px;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 600;
        transition: background 0.15s;
      }
      button:hover {
        background: #22262f;
      }
      button:active {
        transform: scale(0.97);
      }
      .label {
        font-size: 0.65rem;
        color: #8a8f9a;
        margin-top: 0.25rem;
      }
      .note {
        font-size: 0.75rem;
        color: #8a8f9a;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Sound Preview — QA Helper</h1>
    <p class="note">
      Click each button to hear the synthesized cue. Listen for: material feel, repetition
      tolerance, volume balance. All cues use the same Web Audio engine as the game.
    </p>
    <div class="grid" id="btns"></div>
    <div class="note">Default volume: 0.42. Bodies ≤ 280 Hz. No bright chime register.</div>

    <script>
      // Minimal standalone reproduction of Foldwink sound engine
      let ctx, master, noiseBuf;
      function getCtx() {
        if (ctx) return ctx;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        master = ctx.createGain();
        master.gain.value = 0.42;
        master.connect(ctx.destination);
        const len = Math.floor(ctx.sampleRate * 0.25);
        noiseBuf = ctx.createBuffer(1, len, ctx.sampleRate);
        const d = noiseBuf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * 0.9;
        return ctx;
      }
      function tap(c, d, fHz, gain, delay = 0) {
        const t = c.currentTime + (delay || 0),
          s = c.createBufferSource();
        s.buffer = noiseBuf;
        const f = c.createBiquadFilter();
        f.type = "lowpass";
        f.frequency.value = fHz;
        f.Q.value = 0.7;
        const g = c.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(gain, t + 0.004);
        g.gain.exponentialRampToValueAtTime(0.0001, t + d);
        s.connect(f).connect(g).connect(master);
        s.start(t);
        s.stop(t + d + 0.02);
      }
      function body(c, freq, dur, gain, delay = 0, decay) {
        const t = c.currentTime + (delay || 0),
          o = c.createOscillator();
        o.type = "sine";
        o.frequency.value = freq;
        const g = c.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(gain, t + 0.004);
        g.gain.exponentialRampToValueAtTime(0.0001, t + (decay || dur));
        o.connect(g).connect(master);
        o.start(t);
        o.stop(t + dur + 0.02);
      }
      const recipes = {
        select: (c) => {
          tap(c, 0.05, 1800, 0.2);
        },
        deselect: (c) => {
          tap(c, 0.045, 1200, 0.16);
        },
        submit: (c) => {
          tap(c, 0.04, 1200, 0.22);
          body(c, 140, 0.12, 0.18, 0, 0.16);
        },
        wrong: (c) => {
          tap(c, 0.045, 900, 0.22);
          body(c, 120, 0.14, 0.2, 0, 0.2);
          tap(c, 0.045, 700, 0.18, 0.09);
          body(c, 95, 0.16, 0.18, 0.09, 0.22);
        },
        correct: (c) => {
          [0, 0.07, 0.15].forEach((d, i) => {
            tap(c, 0.035, [1400, 1500, 1600][i], 0.16, d);
            body(c, [180, 215, 250][i], 0.14, 0.16, d, 0.18);
          });
        },
        tabReveal: (c) => {
          tap(c, 0.035, 1800, 0.1);
        },
        wink: (c) => {
          tap(c, 0.04, 1600, 0.15);
          body(c, 280, 0.24, 0.15, 0, 0.3);
          body(c, 210, 0.2, 0.1, 0.01, 0.26);
        },
        win: (c) => {
          [0, 0.09, 0.18, 0.28].forEach((d, i) => {
            tap(c, 0.035, [1300, 1400, 1500, 1600][i], 0.16, d);
            body(c, [170, 190, 215, 240][i], 0.2, 0.14, d, 0.26);
          });
        },
        loss: (c) => {
          tap(c, 0.055, 500, 0.22);
          body(c, 95, 0.4, 0.22, 0, 0.5);
        },
      };
      const labels = {
        select: "Paper edge",
        deselect: "Card drop",
        submit: "Wood knock",
        wrong: "Double knock",
        correct: "Bone settle ×3",
        tabReveal: "Paper flip",
        wink: "Tile lift",
        win: "Settle ×4",
        loss: "Low thud",
      };
      const el = document.getElementById("btns");
      for (const [name, fn] of Object.entries(recipes)) {
        const b = document.createElement("button");
        b.innerHTML = `${name}<div class="label">${labels[name]}</div>`;
        b.onclick = () => {
          const c = getCtx();
          if (c.state === "suspended") c.resume().then(() => fn(c));
          else fn(c);
        };
        el.appendChild(b);
      }
    </script>
  </body>
</html>
